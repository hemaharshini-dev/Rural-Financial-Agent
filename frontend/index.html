<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🌾 Rural Financial Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      color: #1a1a2e;
    }

    header {
      background: #1a1a2e;
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.2rem; }
    header span { font-size: 1.5rem; }

    .tabs {
      display: flex;
      background: #16213e;
    }
    .tab {
      padding: 12px 28px;
      color: #aaa;
      cursor: pointer;
      font-size: 0.9rem;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
    }
    .tab.active {
      color: #fff;
      border-bottom: 3px solid #e94560;
    }

    .panel { display: none; padding: 24px; max-width: 720px; margin: 0 auto; }
    .panel.active { display: block; }

    /* ── CHAT ── */
    #chat-box {
      background: white;
      border-radius: 12px;
      height: 420px;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .msg {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 0.92rem;
      line-height: 1.5;
      word-wrap: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: #e94560;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .msg.bot {
      align-self: flex-start;
      background: #eef2f7;
      color: #1a1a2e;
      border-bottom-left-radius: 4px;
    }
    .msg.typing { color: #999; font-style: italic; }

    .chat-input {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .chat-input input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 24px;
      border: 1px solid #ddd;
      font-size: 0.95rem;
      outline: none;
    }
    .chat-input input:focus { border-color: #e94560; }
    .chat-input button {
      background: #e94560;
      color: white;
      border: none;
      border-radius: 24px;
      padding: 12px 22px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: background 0.2s;
    }
    .chat-input button:hover { background: #c73652; }

    /* ── ADD / SEARCH ── */
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .card h2 { font-size: 1rem; margin-bottom: 16px; color: #16213e; }

    label { font-size: 0.85rem; color: #555; display: block; margin-bottom: 4px; }

    input[type="text"], input[type="number"], textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.92rem;
      margin-bottom: 14px;
      outline: none;
      font-family: inherit;
    }
    input:focus, textarea:focus { border-color: #e94560; }
    textarea { resize: vertical; min-height: 90px; }

    .btn {
      background: #1a1a2e;
      color: white;
      border: none;
      padding: 11px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.92rem;
      transition: background 0.2s;
    }
    .btn:hover { background: #e94560; }

    .result-box {
      margin-top: 16px;
      background: #eef2f7;
      border-radius: 8px;
      padding: 14px;
      font-size: 0.9rem;
      min-height: 48px;
      color: #333;
      white-space: pre-wrap;
    }

    .status {
      margin-top: 12px;
      font-size: 0.88rem;
      color: #2ecc71;
      min-height: 20px;
    }
    .status.error { color: #e94560; }
  </style>
</head>
<body>

<header>
  <span>🌾</span>
  <h1>Rural Financial Agent</h1>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('chat')">💬 Chat</div>
  <div class="tab" onclick="switchTab('add')">➕ Add Knowledge</div>
  <div class="tab" onclick="switchTab('search')">🔍 Search</div>
</div>

<!-- CHAT -->
<div id="tab-chat" class="panel active">
  <div id="chat-box">
    <div class="msg bot">👋 Hello! I'm your Rural Financial Agent. Ask me anything about banking, loans, or government schemes.</div>
  </div>
  <div class="chat-input">
    <input type="text" id="chat-input" placeholder="Ask something... e.g. How do I open a bank account?" />
    <button onclick="sendChat()">Send</button>
  </div>
</div>

<!-- ADD -->
<div id="tab-add" class="panel">
  <div class="card">
    <h2>Add Financial Knowledge to Qdrant</h2>
    <label>ID (unique number)</label>
    <input type="number" id="add-id" placeholder="e.g. 1" />
    <label>Knowledge Text</label>
    <textarea id="add-text" placeholder="e.g. PM Jan Dhan Yojana is a government scheme to provide bank accounts to unbanked citizens..."></textarea>
    <button class="btn" onclick="addKnowledge()">Add to Database</button>
    <div class="status" id="add-status"></div>
  </div>
</div>

<!-- SEARCH -->
<div id="tab-search" class="panel">
  <div class="card">
    <h2>Search Knowledge Base</h2>
    <label>Search Query</label>
    <input type="text" id="search-query" placeholder="e.g. interest rate on savings account" />
    <button class="btn" onclick="doSearch()">Search</button>
    <div class="result-box" id="search-results">Results will appear here...</div>
  </div>
</div>

<script>
  const API = "http://localhost:5000";

  function switchTab(name) {
    document.querySelectorAll(".tab").forEach((t, i) => {
      t.classList.toggle("active", ["chat","add","search"][i] === name);
    });
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    document.getElementById("tab-" + name).classList.add("active");
  }

  // ── CHAT ──
  const chatBox = document.getElementById("chat-box");
  const chatInput = document.getElementById("chat-input");

  chatInput.addEventListener("keydown", e => { if (e.key === "Enter") sendChat(); });

  function appendMsg(text, role) {
    const div = document.createElement("div");
    div.className = "msg " + role;
    div.textContent = text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
    return div;
  }

  async function sendChat() {
    const msg = chatInput.value.trim();
    if (!msg) return;
    chatInput.value = "";
    appendMsg(msg, "user");
    const typing = appendMsg("Thinking...", "bot typing");
    try {
      const res = await fetch(`${API}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: msg })
      });
      const data = await res.json();
      typing.textContent = data.reply || "No response.";
      typing.classList.remove("typing");
    } catch {
      typing.textContent = "⚠️ Could not reach the server. Is it running?";
      typing.classList.remove("typing");
    }
  }

  // ── ADD ──
  async function addKnowledge() {
    const id = parseInt(document.getElementById("add-id").value);
    const text = document.getElementById("add-text").value.trim();
    const status = document.getElementById("add-status");
    if (!id || !text) { status.textContent = "Please fill in both fields."; status.className = "status error"; return; }
    status.textContent = "Adding..."; status.className = "status";
    try {
      const res = await fetch(`${API}/add`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id, text })
      });
      const data = await res.json();
      status.textContent = "✅ " + (data.message || "Added successfully!");
      document.getElementById("add-id").value = "";
      document.getElementById("add-text").value = "";
    } catch {
      status.textContent = "⚠️ Could not reach the server."; status.className = "status error";
    }
  }

  // ── SEARCH ──
  async function doSearch() {
    const query = document.getElementById("search-query").value.trim();
    const box = document.getElementById("search-results");
    if (!query) return;
    box.textContent = "Searching...";
    try {
      const res = await fetch(`${API}/search`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ query })
      });
      const data = await res.json();
      box.textContent = data.results?.length
        ? data.results.map((r, i) => `${i + 1}. ${r}`).join("\n\n")
        : "No results found.";
    } catch {
      box.textContent = "⚠️ Could not reach the server.";
    }
  }
</script>

</body>
</html>
